	function top10_animesu_left_click(elm){
      var slider = elm.parentElement.querySelector('.topten-animesu');
      if(!slider)return;
      var iwidth = slider.firstElementChild.firstElementChild.offsetWidth + 4;
      if(iwidth <= 0)return;      
      var cwidth = slider.clientWidth;
      if(cwidth <= 0)return;      
      var fwidth = slider.firstElementChild.childElementCount * iwidth;
      if(fwidth <= cwidth)return;
      var sleft  = slider.scrollLeft - iwidth;
      if(sleft < 0)sleft = 0;
      slider.scrollLeft = sleft;
	}
