name: Scrape & Sync Backup Cron

on:
  schedule:
    - cron: '0 */2 * * *'  # Runs every 2 hours
  workflow_dispatch: # Allows manual trigger

jobs:
  ping-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Scraper
        run: |
          curl -X GET "${{ secrets.SPACE_URL }}/api/v2/health" -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" || echo "Failed to ping health"
          # We can also add a specific POST endpoint to trigger mass_sync if the backend exposes one.
          # curl -X POST "${{ secrets.SPACE_URL }}/api/trigger-scrape"
